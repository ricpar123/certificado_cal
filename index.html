  <script>
(() => {
  const canvas = document.getElementById("firmaCanvas");
  const wrap = canvas.parentElement;
  const ctx = canvas.getContext("2d");

  // 🔥 Ajustar el tamaño REAL del canvas al tamaño CSS (y a la densidad de pantalla)
  function resizeCanvas() {
    const rect = canvas.getBoundingClientRect();
    const dpr = window.devicePixelRatio || 1;

    canvas.width  = Math.round(rect.width * dpr);
    canvas.height = Math.round(rect.height * dpr);

    // Escalar el contexto para que 1 unidad = 1 px CSS
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.scale(dpr, dpr);

    // Configuración de trazo (negro, visible)
    ctx.lineWidth = 2.5;
    ctx.lineCap = "round";
    ctx.lineJoin = "round";
    ctx.strokeStyle = "#000";
  }

  resizeCanvas();
  window.addEventListener("resize", resizeCanvas);

  let drawing = false;
  let lastX = 0, lastY = 0;

  function getPos(e) {


    const rect = canvas.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    return { x: clientX - rect.left, y: clientY - rect.top };
  }

  function start(e) {
    e.preventDefault();
    drawing = true;
    const p = getPos(e);
    lastX = p.x; lastY = p.y;
  }

  function move(e) {
    const rW = wrap.getBoundingClientRect();
    const rC = canvas.getBoundingClientRect();
    console.log("wrap:", rW.left, rW.top, rW.width, rW.height);
    console.log("canvas:", rC.left, rC.top, rC.width, rC.height);
    if (!drawing) return;
    e.preventDefault();
    const p = getPos(e);

    ctx.beginPath();
    ctx.moveTo(lastX, lastY);
    ctx.lineTo(p.x, p.y);
    ctx.stroke();

    lastX = p.x; lastY = p.y;
  }

  function end(e) {
    if (!drawing) return;
    e.preventDefault();
    drawing = false;

    //Auto-guardar firma al soltar
    const dataUrl = canvas.toDataURL("imagr/png");
    const hidden = document.getElementById("firmaBase64");
    if(hidden) hidden.value = dataUrl;

    console.log('firma auto-guardada:', dataUrl.slice(0,30));
  }

  // Mouse
  canvas.addEventListener("mousedown", start);
  canvas.addEventListener("mousemove", move);
  canvas.addEventListener("mouseleave", end)
  window.addEventListener("mouseup", end);

  // Touch
  canvas.addEventListener("touchstart", start, { passive: false });
  canvas.addEventListener("touchmove", move, { passive: false });
  canvas.addEventListener("touchend", end);

  // Botones
  document.getElementById("btnLimpiarFirma").addEventListener("click", () => {
    // limpiar
    const rect = canvas.getBoundingClientRect();
    ctx.clearRect(0, 0, rect.width, rect.height);
    document.getElementById("firmaBase64").value = "";
  });

  
})();
</script>
